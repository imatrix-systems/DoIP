# DCU Phone-Home Configuration
# See DCU_PhoneHome_Specification.md Section 9.1

BASTION_HOST=bastion-dev.imatrixsys.com
BASTION_PORT=22
TUNNEL_TIMEOUT=3600
RETRY_ON_DISCONNECT=0
LOG_LEVEL=info
DOIP_SOURCE_ADDR=0x0001
HMAC_SECRET_FILE=/etc/phonehome/hmac_secret
CONNECT_SCRIPT=/usr/sbin/phonehome-connect.sh
LOCK_FILE=/etc/phonehome/phonehome.lock
SSH_USER=imatrix
# Bastion SSH client public key — installed in /home/imatrix/.ssh/authorized_keys
# Get this from: sudo docker exec web-ssh-bastion-web-1 cat /opt/web-ssh-bastion/bastion_key.pub
BASTION_CLIENT_KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJTRoKQaFz+kY86uQzxfg+tcS03RJEDlnEcCybGgdVt3 bastion
# SSH Certificate Authority public key (recommended for fleet deployment)
# When set, the DCU trusts any bastion whose host key is signed by this CA.
# This eliminates fleet-wide firmware updates on bastion host key rotation.
# Leave empty to use static host key pinning (bastion_pubkey from FC-1).
# Get this from the operations team: cat imatrix_ssh_ca.pub
SSH_CA_PUBKEY=
